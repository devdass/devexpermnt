<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>devexpermnt</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #ffffff0f;
      --accent: #00ff88;
      --accent2: #7b5ea7;
      --text: #ccc;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- header --- */
    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2.5rem 1.5rem;
      display: flex;
      align-items: flex-end;
      gap: 2rem;
    }

    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.25em;
      color: #fff;
    }

    header h1 span { color: var(--accent); }

    header p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      padding-bottom: 0.15rem;
    }

    /* --- main --- */
    main {
      flex: 1;
      padding: 2.5rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    /* --- grid --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .card {
      background: var(--surface);
      padding: 1.75rem;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
      overflow: hidden;
      transition: background 0.15s;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--card-color, var(--accent))08, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover { background: #16161f; }
    .card:hover::before { opacity: 1; }

    .card-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .card-name {
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: var(--card-color, var(--accent));
      text-transform: uppercase;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      letter-spacing: 0.05em;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      padding: 0.2rem 0.5rem;
      border: 1px solid;
      border-color: var(--card-color, var(--accent));
      color: var(--card-color, var(--accent));
      opacity: 0.5;
      text-transform: uppercase;
      margin-top: auto;
      align-self: flex-start;
    }

    .card-arrow {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 0.8rem;
      color: var(--card-color, var(--accent));
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.2s;
    }

    .card:hover .card-arrow {
      opacity: 0.7;
      transform: translateX(0);
    }

    /* coming soon card */
    .card.soon {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    .card.soon .card-name { color: var(--muted); }
    .card.soon .card-tag { border-color: var(--muted); color: var(--muted); }

    /* --- footer --- */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 2.5rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 500px) {
      header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      main { padding: 1.5rem; }
      footer { flex-direction: column; gap: 0.5rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>dev<span>expermnt</span></h1>
  <p>a collection of experiments &amp; small builds</p>
</header>

<main>
  <div class="section-label">/ apps</div>

  <div class="grid">

    <a class="card" href="./snake/" style="--card-color:#00ff88">
      <div class="card-icon">🐍</div>
      <div class="card-name">SNEK</div>
      <div class="card-desc">Classic snake with neon visuals, particle effects, and escalating speed. WASD or swipe to play.</div>
      <div class="card-tag">game</div>
      <div class="card-arrow">→</div>
    </a>

    <div class="card soon" style="--card-color:#ff6b6b">
      <div class="card-icon">🔲</div>
      <div class="card-name">???</div>
      <div class="card-desc">Next experiment. TBD.</div>
      <div class="card-tag">coming soon</div>
    </div>

    <div class="card soon" style="--card-color:#6b9fff">
      <div class="card-icon">🔲</div>
      <div class="card-name">???</div>
      <div class="card-desc">Another one.</div>
      <div class="card-tag">coming soon</div>
    </div>

  </div>
</main>

<footer>
  <span>devexpermnt — github.com/devdass</span>
  <span id="count"></span>
</footer>

<script>
  const apps = document.querySelectorAll('.card:not(.soon)').length;
  document.getElementById('count').textContent = `${apps} app${apps !== 1 ? 's' : ''} live`;
</script>

</body>
</html>
