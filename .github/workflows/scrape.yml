name: scrape

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Scrape TradeMe
        env:
          TRADEME_CONSUMER_KEY:    ${{ secrets.TRADEME_CONSUMER_KEY }}
          TRADEME_CONSUMER_SECRET: ${{ secrets.TRADEME_CONSUMER_SECRET }}
          TRADEME_OAUTH_TOKEN:     ${{ secrets.TRADEME_OAUTH_TOKEN }}
          TRADEME_OAUTH_SECRET:    ${{ secrets.TRADEME_OAUTH_SECRET }}
        run: node scraper/index.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "data: scrape ${TIMESTAMP}"
            git push
          fi
